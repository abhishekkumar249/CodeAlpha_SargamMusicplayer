<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SargamPlay</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>

<div class="app">
<aside class="sidebar">
<img src="logo.svg" class="logo">
<h1>SargamPlay</h1>

<input id="search" placeholder="Search songs">
<div id="playlist"></div>
</aside>

<main class="player">
<div class="glass">
<div class="disc"></div>

<h2 id="title">Add Your Songs</h2>
<p id="artist">Artist</p>

<audio id="audio"></audio>

<input type="range" id="progress" value="0">

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button id="playBtn" onclick="togglePlay()">▶</button>
<button onclick="next()">⏭</button>
</div>

<div class="extras">
<button onclick="shuffle()">🔀</button>
<button onclick="toggleRepeat()">🔁</button>
<label>Autoplay <input id="autoplay" type="checkbox" checked></label>
</div>

<div class="volume">
🔊 <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8">
</div>

<button class="theme" onclick="toggleTheme()">🌙 Dark / Light</button>
</div>
</main>
</div>

<script src="script.js"></script>
</body>
</html>
